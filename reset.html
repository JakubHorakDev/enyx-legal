<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – ENYX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 400px; width: 100%; }
    .logo { font-size: 32px; font-weight: 800; letter-spacing: 4px; color: #fff; margin-bottom: 8px; text-align: center; }
    .subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 36px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #9ca3af; margin-bottom: 6px; margin-top: 16px; }
    input { width: 100%; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 14px 16px; font-size: 15px; color: #fff; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #5b4bff; }
    input::placeholder { color: #4b5563; }
    .btn { width: 100%; background: #5b4bff; color: #fff; font-size: 16px; font-weight: 700; padding: 16px; border-radius: 14px; border: none; cursor: pointer; margin-top: 28px; transition: background 0.2s; }
    .btn:hover { background: #4a3de0; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 20px; padding: 14px 16px; border-radius: 12px; font-size: 14px; display: none; }
    .msg.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; }
    .msg.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ENYX</div>
    <div class="subtitle">Fitness tracking app</div>

    <h1>Set new password</h1>

    <label for="password">New Password</label>
    <input type="password" id="password" placeholder="New password" autocomplete="new-password" />

    <label for="confirm">Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" />

    <button class="btn" id="btn" onclick="handleReset()">Update Password</button>

    <div class="msg" id="msg"></div>
    <span class="back" id="back" style="display:none">You can now close this page and sign in to the app.</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://jdrnxoxasdlqthhpjwjf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_1PWK8izPz4yuNf3fnKeOYA_MkkaWQWn';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Exchange code/token from URL
    async function init() {
      const hash = window.location.hash.substring(1);
      const search = window.location.search.substring(1);
      const params = new URLSearchParams(hash || search);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const code = params.get('code');

      if (code) {
        await client.auth.exchangeCodeForSession(code);
      } else if (accessToken && refreshToken) {
        await client.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      }
    }

    init();

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('btn');

      if (!password) { showMsg('Please enter a new password.', 'error'); return; }
      if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
      if (password !== confirm) { showMsg("Passwords don't match.", 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        showMsg(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        await client.auth.signOut();
        showMsg('Password updated successfully!', 'success');
        btn.style.display = 'none';
        document.getElementById('back').style.display = 'block';
      }
    }
  </script>
</body>
</html>
