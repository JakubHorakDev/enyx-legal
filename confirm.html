<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed – ENYX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 400px; width: 100%; text-align: center; }
    .logo { font-size: 32px; font-weight: 800; letter-spacing: 4px; color: #5b4bff; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: #9ca3af; line-height: 1.6; margin-bottom: 20px; }
    .btn { display: inline-block; background: #5b4bff; color: #fff; font-size: 15px; font-weight: 600; padding: 14px 28px; border-radius: 12px; text-decoration: none; cursor: pointer; border: none; }
    .btn:hover { background: #4a3de0; }
    .desktop-note { font-size: 13px; color: #6b7280; margin-top: 16px; }
    #desktop-msg { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ENYX</div>

    <div id="mobile-msg">
      <h1>Email Confirmed</h1>
      <p>Your account is ready. Tap the button below to open the app and sign in.</p>
      <a id="open-app" href="#" class="btn">Open ENYX</a>
    </div>

    <div id="desktop-msg">
      <h1>Email Confirmed</h1>
      <p>Your account is ready. Open the ENYX app on your phone and sign in with your email and password.</p>
    </div>
  </div>

  <script>
    // Convert hash params to query params so expo-router can parse them
    const rawHash = window.location.hash.substring(1); // remove leading #
    const rawSearch = window.location.search.substring(1); // remove leading ?
    const params = rawHash || rawSearch;
    const deepLink = 'enyx://auth/callback?' + params;

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      document.getElementById('open-app').href = deepLink;
      // Auto-open on mobile
      window.location.href = deepLink;
    } else {
      document.getElementById('mobile-msg').style.display = 'none';
      document.getElementById('desktop-msg').style.display = 'block';
    }
  </script>
</body>
</html>
